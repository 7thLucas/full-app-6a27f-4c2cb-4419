apiVersion: skaffold/v4beta7
kind: Config
build:
  tagPolicy:
    customTemplate:
      template: "latest"
  cluster:
    namespace: qb-prototypes
    dockerConfig:
      path: .docker/config.json
  artifacts:
  - image: quantumteknologi/g0fpf2x9-4419-staging
    context: .
    kaniko:
      cache: {}
      dockerfile: Dockerfile.dev
    sync:
      infer:
        - 'app/**/*'
        - 'src/**/*'
        - 'public/**/*'
        - 'components/**/*'
        - 'tsconfig.json'
        - '*.css'
        - '*.html'
manifests:
  rawYaml:
    - k8s/*.yaml
deploy:
  kubectl: {}
